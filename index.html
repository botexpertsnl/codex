<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Empire of Shadows - Region Strategy MVP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="top-bar">
        <div class="stat-pill"><span>Level</span><strong id="levelValue">1</strong></div>
        <div class="stat-pill"><span>Rank</span><strong id="rankValue">Small Hustler</strong></div>
        <div class="stat-pill"><span>Money</span><strong id="moneyValue">$0</strong></div>
        <div class="stat-pill"><span>Respect</span><strong id="respectValue">0</strong></div>
        <div class="stat-pill"><span>Reputation</span><strong id="reputationValue">0</strong></div>
      </header>

      <main class="main-content">
        <section class="region-selector card">
          <h2>Region Selector</h2>
          <p id="regionMeta" class="muted"></p>
          <div id="regionMap" class="region-map"></div>
        </section>

        <section class="card">
          <h2>Street Control - <span id="selectedRegionLabel"></span></h2>
          <div id="streetList" class="stack"></div>
        </section>

        <section class="card">
          <h2>Shops - <span id="selectedStreetLabel">Select a street</span></h2>
          <div id="shopList" class="stack"></div>
        </section>

        <section class="card">
          <h2>Crew (Region Context)</h2>
          <div id="crewPanel" class="stack"></div>
        </section>

        <section class="card">
          <h2>Properties - <span id="propertyRegionLabel"></span></h2>
          <div id="propertyList" class="stack"></div>
        </section>

        <section class="card">
          <h2>Activity Log</h2>
          <div id="activityLog" class="log-list"></div>
        </section>
      </main>
    </div>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content">
        <h3 id="modalTitle">Result</h3>
        <p id="modalMessage"></p>
        <button id="modalClose" class="btn primary">Close</button>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
